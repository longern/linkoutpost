<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="color-scheme" content="dark light" />
  <script>
    (() => {
      const path = window.location.pathname;
      const isAppPage =
        path === "/" ||
        path === "/privacy" ||
        path === "/terms" ||
        path === "/license" ||
        path === "/admin" ||
        path.startsWith("/admin/") ||
        path === "/signin" ||
        path.startsWith("/signin/");

      if (!isAppPage) return;

      try {
        const storedTheme = localStorage.getItem("linkoutpost:app-theme");
        document.documentElement.dataset.appTheme =
          storedTheme === "light" || storedTheme === "dark"
            ? storedTheme
            : "dark";
      } catch {
        document.documentElement.dataset.appTheme = "dark";
      }
    })();
  </script>
  <!--linkoutpost-document-meta-start-->
  <meta name="description"
    content="Create a free hosted link page, export your profile data and page files, or deploy a rendered static page anywhere." />
  <meta property="og:description"
    content="Create a free hosted link page, export your profile data and page files, or deploy a rendered static page anywhere." />
  <meta property="og:site_name" content="LinkOutpost" />
  <meta property="og:title" content="LinkOutpost" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:description"
    content="Create a free hosted link page, export your profile data and page files, or deploy a rendered static page anywhere." />
  <meta name="twitter:title" content="LinkOutpost" />
  <title>LinkOutpost</title>
  <!--linkoutpost-document-meta-end-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
